<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فرم ثبت نمرات</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap');
        body { font-family: 'Vazirmatn', Tahoma, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 650px; background: #fff; margin: auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .checkbox-group { display: grid; gap: 10px; background: #fafafa; padding: 15px; border-radius: 8px; }
        button { width: 100%; background: #3498db; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; }
        .result-box { background: #2ecc71; color: white; padding: 15px; text-align: center; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>فرم محاسبه و ثبت نمرات</h2>
    <form id="gradingForm">
        <div class="form-group"><label>نام و نام خانوادگی:</label><input type="text" id="studentName" required></div>
        <div class="form-group"><label>شماره دانشجویی:</label><input type="text" id="studentId" required></div>
        <div class="form-group"><label>شماره موبایل:</label><input type="text" id="mobile" placeholder="09123456789" required></div>

        <div class="form-group"><label>تعداد جلسات نهاد:</label><input type="number" id="virtualSessions" value="0" oninput="calculateTotalScore()"></div>
        <div class="form-group"><label>تعداد غیبت‌ها:</label><input type="number" id="absences" value="0" oninput="calculateTotalScore()"></div>

        <div class="checkbox-group">
            <label><input type="checkbox" id="attendance" onchange="calculateTotalScore()"> حضور منظم (۲ نمره)</label>
            <label><input type="checkbox" id="presentation" onchange="calculateTotalScore()"> ارائه گروهی (۳ نمره)</label>
            <label><input type="checkbox" id="forum" onchange="calculateTotalScore()"> کرسی آزاد اندیشی (۲ نمره)</label>
            <label><input type="checkbox" id="documentary" onchange="calculateTotalScore()"> تحلیل مستند (۳ نمره)</label>
        </div>

        <div class="form-group"><label>جلسات فرادرس:</label><input type="number" id="faradarsSessions" value="0" oninput="calculateTotalScore()"></div>
        <div class="form-group"><label>تعداد چالش‌نوردی:</label><input type="number" id="challengeCount" value="0" oninput="calculateTotalScore()"></div>
        
        <div class="form-group"><label>برگزاری فرادرس:</label><select id="teachFaradars"><option>بله</option><option>خیر</option></select></div>
        <div class="form-group"><label>فعالیت ویژه:</label><select id="specialActivity"><option>خیر</option><option>بله</option></select></div>

        <div class="result-box">مجموع نمره: <span id="totalScore">0</span></div>
        <button type="submit" id="submitBtn">ثبت و ارسال به اکسل</button>
        <div id="statusMessage"></div>
    </form>
</div>

<script>
    function calculateTotalScore() {
        let total = 0;
        const vS = parseInt(document.getElementById('virtualSessions').value) || 0;
        const vScore = Math.min(vS * (3/14), 3);
        
        let actScore = (document.getElementById('attendance').checked ? 2 : 0) +
                       (document.getElementById('presentation').checked ? 3 : 0) +
                       (document.getElementById('forum').checked ? 2 : 0) +
                       (document.getElementById('documentary').checked ? 3 : 0);
        
        const abs = parseInt(document.getElementById('absences').value) || 0;
        actScore = Math.max(0, actScore - (abs * 0.25));
        
        const fS = parseInt(document.getElementById('faradarsSessions').value) || 0;
        const fScore = (Math.floor(fS / 4) * 2) + ((fS % 4) * 0.25);
        
        const cC = parseInt(document.getElementById('challengeCount').value) || 0;
        const cScore = cC * 0.25;
        
        total = Math.min(vScore + actScore + fScore + cScore, 20);
        document.getElementById('totalScore').innerText = total.toFixed(2);
        
        return { total: total.toFixed(2), vS, vScore: vScore.toFixed(2), abs, actScore: actScore.toFixed(2), fS, fScore: fScore.toFixed(2), cC, cScore: cScore.toFixed(2) };
    }

    document.getElementById('gradingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = 'در حال ارسال...';
        const res = calculateTotalScore();
        const scriptURL = 'لینک_گوگل_اسکریپت_خود_را_اینجا_بگذارید';
        
        let fd = new FormData();
        fd.append('studentName', document.getElementById('studentName').value);
        fd.append('studentId', document.getElementById('studentId').value);
        fd.append('mobile', document.getElementById('mobile').value);
        fd.append('virtualSessions', res.vS); fd.append('virtualScore', res.vScore);
        fd.append('absences', res.abs); fd.append('activityScore', res.actScore);
        fd.append('faradarsSessions', res.fS); fd.append('faradarsScore', res.fScore);
        fd.append('challengeCount', res.cC); fd.append('challengeScore', res.cScore);
        fd.append('teachFaradars', document.getElementById('teachFaradars').value);
        fd.append('specialActivity', document.getElementById('specialActivity').value);
        fd.append('totalScore', res.total);
        fd.append('date', new Date().toLocaleString('fa-IR'));

        fetch(scriptURL, { method: 'POST', body: fd })
        .then(() => { alert('ثبت شد!'); document.getElementById('gradingForm').reset(); })
        .catch(err => alert('خطا!'))
        .finally(() => { btn.disabled = false; btn.innerText = 'ثبت و ارسال به اکسل'; });
    });
</script>
</body>
</html>
