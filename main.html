<script>
    function calculateTotalScore() {
        let total = 0;

        // ۱. سامانه نهاد
        const sessions = parseInt(document.getElementById('virtualSessions').value) || 0;
        let virtualScore = Math.min(sessions * (3 / 14), 3);
        total += virtualScore;

        // ۲. فعالیت‌های کلاسی
        let activityScore = 0;
        if (document.getElementById('attendance').checked) activityScore += 2;
        if (document.getElementById('presentation').checked) activityScore += 3;
        if (document.getElementById('forum').checked) activityScore += 2;
        if (document.getElementById('documentary').checked) activityScore += 3;
        
        // اعمال جریمه غیبت
        const absences = parseInt(document.getElementById('absences').value) || 0;
        activityScore = Math.max(0, activityScore - (absences * 0.25));
        total += activityScore;

        // ۳. فرادرس
        const faradarsSessions = parseInt(document.getElementById('faradarsSessions').value) || 0;
        let faradarsScore = (Math.floor(faradarsSessions / 4) * 2) + ((faradarsSessions % 4) * 0.25);
        total += faradarsScore;

        // ۴. چالش‌نوردی
        const challengeCount = parseInt(document.getElementById('challengeCount').value) || 0;
        total += (challengeCount * 0.25);

        // سقف نمره
        total = Math.min(total, 20);
        document.getElementById('totalScore').innerText = total.toFixed(2);

        return {
            total: total.toFixed(2),
            virtualSessions: sessions,
            virtualScore: virtualScore.toFixed(2),
            absences: absences,
            activityScore: activityScore.toFixed(2),
            faradarsSessions: faradarsSessions,
            faradarsScore: faradarsScore.toFixed(2),
            challengeCount: challengeCount
        };
    }
    
    // ... بقیه کدهای مربوط به fetch و ارسال (که در پست قبلی بود) ...
</script>
